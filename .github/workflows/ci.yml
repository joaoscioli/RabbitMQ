name: Java CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Run RabbitMQ lab tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: spring-rabbitMQ

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "11"
          cache: maven
          cache-dependency-path: spring-rabbitMQ/pom.xml

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw -B --no-transfer-progress test
